<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schoen aan de voet — v1</title>
  <style>
    :root {
      --bg: #faf8f5;
      --fg: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #c8956d;
      --border: #e5e0d8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
    }
    h1 {
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }




    p.subtitle {
      color: var(--muted);
      margin-top: 0;
      margin-bottom: 2rem;
    }
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      background: white;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: #fff8f0;
    }
    .upload-area input { display: none; }
    .controls {
      display: flex;
      gap: 1rem;
      margin: 1.5rem 0;
      flex-wrap: wrap;
      align-items: center;
    }
    label {
      font-size: 0.9rem;
      color: var(--muted);
    }
    select, button {
      font-size: 1rem;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: white;
      font-family: inherit;
    }
    button {
      background: var(--fg);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button:not(:disabled):hover { background: #333; }
    .results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 2rem;
    }
    @media (max-width: 700px) {
      .results { grid-template-columns: 1fr; }
    }
    .result-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }
    .result-card h3 {
      margin: 0 0 0.75rem 0;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 600;
    }
    .result-card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
    }
    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .status.loading { background: #fff8f0; color: #8a5a2b; }
    .status.error { background: #fde8e8; color: #8a2b2b; }
    .status.success { background: #e8f5e9; color: #2b6b2e; }
    .download-btn {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
    }
    .download-btn:hover { text-decoration: underline; }
    .upload-preview {
      max-height: 140px;
      max-width: 100%;
      border-radius: 8px;
      display: block;
      margin: 0 auto 0.6rem;
      object-fit: contain;
    }
    .progress-wrap {
      margin-top: 0.75rem;
      display: none;
    }
    .progress-track {
      width: 100%;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.4s ease;
    }
    .log-box {
      margin-top: 0.75rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      font-size: 0.8rem;
      font-family: "SF Mono", "Fira Mono", monospace;
      color: var(--muted);
      max-height: 130px;
      overflow-y: auto;
      display: none;
    }
    .log-box .log-line { margin: 0.15rem 0; }
    .log-box .log-line.ok { color: #2b6b2e; }
    .log-box .log-line.err { color: #8a2b2b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Schoen aan de voet</h1>
    <p class="subtitle">Upload een productfoto, krijg een foto van de schoen aan de voet terug.</p>

    <label class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*" />
      <div id="uploadText">
        <strong>Klik om te uploaden</strong> of sleep een foto hier
        <br /><small style="color: var(--muted)">JPG, PNG — één foto per keer</small>
      </div>
    </label>

    <div class="controls">
      <label for="gender">Voet:</label>
      <select id="gender">
        <option value="vrouw">Vrouw</option>
        <option value="man">Man</option>
      </select>
      <label for="preset">Stijl:</label>
      <select id="preset">
        <option value="studio">Studio (wit, neutraal)</option>
        <option value="lifestyle">Lifestyle (buiten, warm)</option>
        <option value="frontaal">Frontaal (paar zichtbaar)</option>
      </select>
      <button id="generateBtn" disabled>Genereer</button>
    </div>

    <div id="status"></div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="log-box" id="logBox"></div>

    <div class="results" id="results" style="display: none;">
      <div class="result-card">
        <h3>Originele foto</h3>
        <img id="originalImg" alt="origineel" />
      </div>
      <div class="result-card">
        <h3>Aan de voet</h3>
        <img id="resultImg" alt="resultaat" />
        <a id="downloadLink" class="download-btn" download>Download foto</a>
      </div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const uploadText = document.getElementById('uploadText');
    const generateBtn = document.getElementById('generateBtn');
    const presetSelect = document.getElementById('preset');
    const genderSelect = document.getElementById('gender');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const downloadLink = document.getElementById('downloadLink');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const logBox = document.getElementById('logBox');

    let selectedFile = null;
    let progressTimer = null;
    let progressVal = 0;

    function setStatus(msg, kind) {
      if (!msg) { status.innerHTML = ''; return; }
      status.innerHTML = `<div class="status ${kind}">${msg}</div>`;
    }

    function addLog(msg, cls = '') {
      logBox.style.display = 'block';
      const now = new Date().toLocaleTimeString('nl-NL', { hour12: false });
      const line = document.createElement('div');
      line.className = 'log-line' + (cls ? ' ' + cls : '');
      line.textContent = `[${now}] ${msg}`;
      logBox.appendChild(line);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLogs() {
      logBox.innerHTML = '';
      logBox.style.display = 'none';
    }

    function startProgress() {
      progressVal = 0;
      progressFill.style.width = '0%';
      progressWrap.style.display = 'block';
      progressTimer = setInterval(() => {
        const step = progressVal < 50 ? 4 : progressVal < 75 ? 2 : 0.5;
        progressVal = Math.min(progressVal + step * Math.random(), 88);
        progressFill.style.width = progressVal + '%';
      }, 400);
    }

    function finishProgress() {
      clearInterval(progressTimer);
      progressFill.style.width = '100%';
      setTimeout(() => { progressWrap.style.display = 'none'; }, 900);
    }

    function resetProgress() {
      clearInterval(progressTimer);
      progressWrap.style.display = 'none';
      progressFill.style.width = '0%';
    }

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleFile(e.target.files[0]);
    });

    ['dragenter', 'dragover'].forEach(ev =>
      uploadArea.addEventListener(ev, (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
      })
    );
    ['dragleave', 'drop'].forEach(ev =>
      uploadArea.addEventListener(ev, (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
      })
    );
    uploadArea.addEventListener('drop', (e) => {
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      selectedFile = file;
      generateBtn.disabled = false;

      const reader = new FileReader();
      reader.onload = (e) => {
        const src = e.target.result;
        originalImg.src = src;
        uploadText.innerHTML = `
          <img src="${src}" class="upload-preview" />
          <strong>${file.name}</strong><br />
          <small style="color: var(--muted)">${(file.size / 1024).toFixed(0)} KB — klaar om te genereren</small>
        `;
      };
      reader.readAsDataURL(file);
    }

    generateBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      generateBtn.disabled = true;
      results.style.display = 'none';
      clearLogs();
      setStatus('Bezig met genereren...', 'loading');
      startProgress();

      const preset = presetSelect.value;
      const gender = genderSelect.value;

      addLog(`Bestand: ${selectedFile.name} (${(selectedFile.size / 1024).toFixed(0)} KB)`);
      addLog(`Stijl: ${preset} | Voet: ${gender}`);
      addLog('Foto uploaden naar server...');

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('preset', preset);
      formData.append('gender', gender);

      try {
        const t0 = performance.now();

        addLog('OpenAI API aanroepen (gpt-image-2)...');
        const res = await fetch('/generate', { method: 'POST', body: formData });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: 'onbekende fout' }));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        addLog('Resultaat ontvangen — afbeelding verwerken...');
        const data = await res.json();
        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

        const dataUrl = `data:image/png;base64,${data.image_b64}`;
        resultImg.src = dataUrl;
        downloadLink.href = dataUrl;
        downloadLink.download = `aan-voet-${Date.now()}.png`;
        results.style.display = 'grid';

        finishProgress();
        addLog(`Input: ${data.input_size} → Output: ${data.output_size}`, 'ok');
        addLog(`Opgeslagen als: ${data.saved_as}`, 'ok');
        addLog(`Totale tijd: ${elapsed}s`, 'ok');
        setStatus(`Klaar in ${elapsed}s — ${data.output_size}`, 'success');
      } catch (err) {
        resetProgress();
        addLog(`Fout: ${err.message}`, 'err');
        setStatus(`Fout: ${err.message}`, 'error');
      } finally {
        generateBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
